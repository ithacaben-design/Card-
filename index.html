<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Post-it Kites</title>
    <style>
        body {
            margin: 0;
            background: #3498db; /* Sky Blue background */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: manipulation;
        }

        .pad-container {
            position: relative;
            width: 200px;
            height: 200px;
        }

        /* The White Stack Pad */
        .white-pad {
            position: absolute;
            width: 200px;
            height: 200px;
            background: #ffffff;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            font-weight: bold;
            font-size: 22px;
            color: #7f8c8d;
            cursor: pointer;
            z-index: 5;
            user-select: none;
            border-radius: 2px;
        }

        /* Individual Kite Note */
        .kite-note {
            position: absolute;
            width: 200px;
            height: 200px;
            background: #ffffff;
            pointer-events: none;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            font-weight: bold;
            color: #e74c3c; /* "I Love You" in Red */
            transition: all 0.8s ease;
        }

        /* Kite Soaring Animation */
        @keyframes kiteSoar {
            0% { transform: translate(0, 0) scale(0.5) rotate(0deg); }
            25% { transform: translate(120px, -250px) scale(0.4) rotate(15deg); }
            50% { transform: translate(-80px, -400px) scale(0.3) rotate(-10deg); }
            75% { transform: translate(150px, -550px) scale(0.2) rotate(10deg); }
            100% { transform: translate(-50px, -800px) scale(0.1) rotate(0deg); opacity: 0; }
        }

        /* The Kite Shape (Classic Diamond) */
        .kite-shape {
            clip-path: polygon(50% 0%, 100% 45%, 50% 100%, 0% 45%);
            background: #ffffff !important;
            box-shadow: none;
        }

        /* Optional: Add a tail visual effect with a border or pseudo-element if desired, 
           but keeping it clean for now. */

    </style>
</head>
<body>

    <div class="pad-container" id="screen">
        <div class="white-pad" id="pad">Tap Me</div>
    </div>

    <script>
        const pad = document.getElementById('pad');
        const screen = document.getElementById('screen');

        const launchKite = (e) => {
            if(e) e.preventDefault();

            // 1. Create a new white note
            const kite = document.createElement('div');
            kite.className = 'kite-note';
            kite.innerText = "I Love You";
            screen.appendChild(kite);

            // 2. Transformation sequence
            setTimeout(() => {
                kite.innerText = "";
                kite.classList.add('kite-shape');
                
                // 3. Launch it into the sky
                const duration = 6 + Math.random() * 4;
                kite.style.animation = `kiteSoar ${duration}s forwards ease-in-out`;

                // 4. Remove from DOM after it flies away to keep performance snappy
                setTimeout(() => {
                    kite.remove();
                }, duration * 1000);
            }, 800);
        };

        pad.addEventListener('mousedown', launchKite);
        pad.addEventListener('touchstart', launchKite, {passive: false});
    </script>
</body>
</html>
